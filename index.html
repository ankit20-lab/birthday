```html
<!DOCTYPE html>
<html>
<head>
<title>Birthday Surprise</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* BODY */

body{
margin:0;
font-family:Arial;
text-align:center;
overflow:hidden;
background:radial-gradient(circle at top,#1a1a3d,#020111);
color:white;
}

/* GALAXY STARS */

.galaxyStar{
position:absolute;
width:2px;
height:2px;
background:white;
animation:galaxyMove 10s linear infinite;
}

@keyframes galaxyMove{
0%{transform:translateY(0);}
100%{transform:translateY(100vh);opacity:0;}
}

/* TWINKLING STARS */

.star{
position:absolute;
width:2px;
height:2px;
background:white;
animation:twinkle 2s infinite alternate;
}

@keyframes twinkle{
from{opacity:0.3;}
to{opacity:1;}
}

/* SHOOTING STARS */

.shootingStar{
position:absolute;
width:3px;
height:3px;
background:white;
box-shadow:0 0 6px white;
animation:shoot 3s linear infinite;
}

@keyframes shoot{
0%{transform:translateX(0) translateY(0);}
100%{transform:translateX(-600px) translateY(400px);opacity:0;}
}

/* MOON */

#moon{
position:absolute;
top:50px;
right:80px;
width:100px;
height:100px;
background:#f5f3ce;
border-radius:50%;
box-shadow:0 0 40px #fff;
}

/* COUNTDOWN */

#countdown{
position:fixed;
top:45%;
left:50%;
transform:translate(-50%,-50%);
font-size:100px;
font-weight:bold;
display:none;
z-index:4000;
text-shadow:0 0 20px #ff00ff;
}

/* GIFT DROP */

#giftBox{
position:fixed;
top:-200px;
left:50%;
transform:translateX(-50%);
font-size:120px;
cursor:pointer;
animation:giftDrop 1.5s ease-out forwards,bounce 1.5s infinite 1.5s;
z-index:2000;
}

@keyframes giftDrop{
0%{top:-200px;}
100%{top:50%;transform:translate(-50%,-50%);}
}

@keyframes bounce{
0%,100%{transform:translate(-50%,-50%) scale(1);}
50%{transform:translate(-50%,-55%) scale(1.1);}
}

/* MAIN CONTENT */

#mainContent{
display:none;
}

/* TITLE */

h1{
margin-top:40px;
font-size:55px;
color:#ff8efb;
text-shadow:0 0 10px #ff8efb;
}

/* MESSAGE */

#message{
font-size:28px;
color:#ffd7ff;
margin-top:10px;
}

/* PHOTO SLIDESHOW */

.slideshow{
width:220px;
height:220px;
margin:20px auto;
position:relative;
}

.slide{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
border-radius:50%;
border:5px solid #ff8efb;
box-shadow:0 0 20px #ff8efb;
opacity:0;
transition:1s;
}

.slide.active{
opacity:1;
}

/* CAKE */

#cake{
position:relative;
width:240px;
height:140px;
margin:80px auto;
perspective:900px;
}

.part{
width:120px;
height:140px;
background:#ffd8a8;
position:absolute;
border:3px solid #e6a87c;
transition:1s;
overflow:hidden;
}

.left{
left:0;
border-radius:12px 0 0 12px;
}

.right{
right:0;
border-radius:0 12px 12px 0;
}

.cut .left{
transform:rotateY(-45deg) translateX(-35px);
}

.cut .right{
transform:rotateY(45deg) translateX(35px);
}

.cakeImg{
width:120px;
height:140px;
object-fit:cover;
}

#cakeName{
position:absolute;
top:55%;
left:50%;
transform:translate(-50%,-50%);
font-size:22px;
font-family:cursive;
color:white;
text-shadow:0 0 10px #ff0080;
}

/* CANDLES */

.candle{
width:8px;
height:30px;
background:white;
position:absolute;
top:-30px;
}

.flame{
width:10px;
height:10px;
background:orange;
border-radius:50%;
position:absolute;
top:-10px;
left:-1px;
display:none;
box-shadow:0 0 10px yellow;
}

.light .flame{
display:block;
}

/* BUTTON */

button{
padding:12px 22px;
font-size:18px;
border:none;
border-radius:10px;
background:#ff9800;
cursor:pointer;
}

/* BALLOONS */

.balloon{
width:60px;
height:80px;
border-radius:50%;
position:absolute;
bottom:-100px;
animation:fly 8s linear infinite;
}

.balloon::after{
content:"";
width:2px;
height:60px;
background:white;
position:absolute;
left:30px;
top:80px;
}

@keyframes fly{
0%{transform:translateY(0);}
100%{transform:translateY(-110vh);}
}

/* CONFETTI */

.confetti{
width:10px;
height:10px;
position:absolute;
top:-10px;
animation:fall 4s linear infinite;
}

@keyframes fall{
0%{transform:translateY(0) rotate(0);}
100%{transform:translateY(100vh) rotate(360deg);}
}

/* FIREWORKS */

.firework{
position:absolute;
width:8px;
height:8px;
background:yellow;
border-radius:50%;
animation:explode 1s ease-out forwards;
}

@keyframes explode{
0%{transform:scale(1);}
100%{transform:scale(20);opacity:0;}
}

/* HEARTS */

.heart{
position:absolute;
color:red;
font-size:20px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(0);}
100%{transform:translateY(-110vh);}
}

/* POPUP */

#popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(0);
background:white;
color:#b30000;
padding:30px;
border-radius:15px;
font-size:30px;
box-shadow:0 0 20px rgba(0,0,0,0.3);
transition:0.5s;
z-index:1000;
}

#popup.show{
transform:translate(-50%,-50%) scale(1);
}

/* CREDIT */

.credit{
position:fixed;
bottom:10px;
right:10px;
font-size:15px;
background:rgba(255,255,255,0.7);
padding:6px 12px;
border-radius:8px;
font-weight:bold;
color:black;
}

</style>
</head>

<body>

<div id="moon"></div>
<div id="countdown"></div>
<div id="giftBox">🎁</div>

<div id="mainContent">

<h1>🎉 Happy Birthday Anasuya 🎂</h1>

<div id="message">
💖 Anasuya, wishing you a wonderful birthday full of happiness! 💖
</div>

<div class="slideshow">
<img src="photo1.jpeg" class="slide active">
<img src="photo2.jpeg" class="slide">
<img src="photo3.jpeg" class="slide">
</div>

<div id="cake">

<div class="part left">
<img src="cake.png" class="cakeImg">
<div class="candle" style="left:30px"><div class="flame"></div></div>
</div>

<div class="part right">
<img src="cake.png" class="cakeImg">
<div class="candle" style="left:60px"><div class="flame"></div></div>
</div>

<div id="cakeName">Anasuya</div>

</div>

<button onclick="cutCake()">🔪 Cut Cake</button>

<audio id="music" src="birthday.mp3"></audio>

<div id="popup">
🎉 Surprise Anasuya! 🎉
</div>

<div class="credit">
💻 Website made by <b>Ankit</b>
</div>

</div>

<script>

/* GALAXY STARS */

for(let i=0;i<200;i++){
let star=document.createElement("div");
star.className="galaxyStar";
star.style.left=Math.random()*100+"%";
star.style.top=Math.random()*100+"%";
document.body.appendChild(star);
}

/* ORIGINAL STARS */

for(let i=0;i<120;i++){
let star=document.createElement("div");
star.className="star";
star.style.left=Math.random()*100+"%";
star.style.top=Math.random()*100+"%";
document.body.appendChild(star);
}

/* SHOOTING STARS */

setInterval(()=>{
let star=document.createElement("div");
star.className="shootingStar";
star.style.left=Math.random()*100+"%";
star.style.top=Math.random()*50+"%";
document.body.appendChild(star);
setTimeout(()=>star.remove(),3000);
},2000);

/* BALLOONS */

for(let i=0;i<20;i++){
let balloon=document.createElement("div");
balloon.className="balloon";
balloon.style.left=Math.random()*100+"%";
balloon.style.backgroundColor="hsl("+Math.random()*360+",70%,60%)";
balloon.style.animationDuration=(5+Math.random()*5)+"s";
document.body.appendChild(balloon);
}

/* COUNTDOWN */

document.getElementById("giftBox").onclick=()=>{
let c=document.getElementById("countdown");
c.style.display="block";

let n=3;
c.innerHTML=n;

let timer=setInterval(()=>{
n--;

if(n==0){
c.innerHTML="🎉";
clearInterval(timer);
c.style.display="none";
openGift();
}else{
c.innerHTML=n;
}

},1000);
}

function openGift(){
document.getElementById("giftBox").style.display="none";
document.getElementById("mainContent").style.display="block";
document.getElementById("music").play();
}

/* SLIDESHOW */

let slides=document.querySelectorAll(".slide");
let index=0;

setInterval(()=>{
slides[index].classList.remove("active");
index=(index+1)%slides.length;
slides[index].classList.add("active");
},3000);

/* CUT CAKE */

function cutCake(){

document.getElementById("cake").classList.toggle("cut");

document.getElementById("music").play();

document.getElementById("popup").classList.add("show");

document.querySelectorAll(".candle").forEach(c=>{
c.classList.add("light");
});

launchFireworks();
startConfetti();
startHearts();

setTimeout(()=>{
document.getElementById("popup").classList.remove("show");
},4000);

}

/* CONFETTI */

function startConfetti(){
for(let i=0;i<80;i++){
let conf=document.createElement("div");
conf.className="confetti";
conf.style.left=Math.random()*100+"%";
conf.style.backgroundColor="hsl("+Math.random()*360+",70%,60%)";
document.body.appendChild(conf);
}
}

/* FIREWORKS */

function launchFireworks(){
for(let i=0;i<15;i++){
let f=document.createElement("div");
f.className="firework";
f.style.left=Math.random()*100+"%";
f.style.top=Math.random()*50+"%";
document.body.appendChild(f);
}
}

/* HEARTS */

function startHearts(){
for(let i=0;i<20;i++){
let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤";
heart.style.left=Math.random()*100+"%";
document.body.appendChild(heart);
}
}

</script>

</body>
</html>
