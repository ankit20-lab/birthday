<html>

<head>
<title>Anasuya’s Birthday Galaxy</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#020111">
<link rel="apple-touch-icon" href="icon.png">

<style>

body{
margin:0;
overflow:hidden;
font-family:Arial;
text-align:center;
color:white;
background:radial-gradient(circle at top,#1a1a3d,#020111);
}

/* ===== GOD LEVEL ADDITION : SPACE CANVAS ===== */

#space{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
}

/* GALAXY TITLE */

#galaxyTitle{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:flex;
align-items:center;
justify-content:center;
font-size:50px;
z-index:10000;
animation:titleFade 4s forwards;
}

@keyframes titleFade{
0%{opacity:0;transform:scale(0.5);}
50%{opacity:1;transform:scale(1.1);}
100%{opacity:0;visibility:hidden;}
}

/* CINEMATIC INTRO */

#cinemaIntro{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
animation:fadeOut 5s forwards;
}

.cinemaText{
font-size:40px;
text-align:center;
animation:zoomText 5s;
}

@keyframes zoomText{
0%{transform:scale(0.5);opacity:0;}
50%{transform:scale(1.2);opacity:1;}
100%{transform:scale(1);}
}

@keyframes fadeOut{
0%{opacity:1;}
80%{opacity:1;}
100%{opacity:0;visibility:hidden;}
}

/* STARS */

.star{
position:absolute;
width:2px;
height:2px;
background:white;
animation:twinkle 2s infinite alternate;
}

@keyframes twinkle{
from{opacity:0.2;}
to{opacity:1;}
}

/* BALLOONS */

.balloon{
width:60px;
height:80px;
border-radius:50%;
position:absolute;
bottom:-120px;
animation:fly 8s linear infinite;
}

.balloon:after{
content:"";
position:absolute;
width:2px;
height:60px;
background:white;
left:29px;
top:80px;
}

@keyframes fly{
0%{transform:translateY(0);}
100%{transform:translateY(-120vh);}
}

/* SHOOTING STAR */

.shoot{
position:absolute;
width:3px;
height:3px;
background:white;
box-shadow:0 0 10px white;
animation:shootMove 3s linear forwards;
}

@keyframes shootMove{
0%{transform:translate(0,0);}
100%{transform:translate(-700px,400px);opacity:0;}
}

/* GIFT */

#gift{
display:none;
position:fixed;
top:40%;
left:50%;
transform:translate(-50%,-50%);
font-size:120px;
cursor:pointer;
animation:shake 1s infinite;
}

@keyframes shake{
0%{transform:translate(-50%,-50%) rotate(0);}
25%{transform:translate(-50%,-50%) rotate(6deg);}
50%{transform:translate(-50%,-50%) rotate(-6deg);}
75%{transform:translate(-50%,-50%) rotate(6deg);}
100%{transform:translate(-50%,-50%) rotate(0);}
}

/* GIFT PARTICLES */

.giftParticle{
position:absolute;
width:6px;
height:6px;
background:gold;
border-radius:50%;
animation:particleBlast 1s ease-out forwards;
}

@keyframes particleBlast{
0%{transform:translate(0,0);opacity:1;}
100%{transform:translate(var(--x),var(--y));opacity:0;}
}

/* COUNTDOWN */

#countdown{
position:fixed;
top:45%;
left:50%;
transform:translate(-50%,-50%);
font-size:120px;
display:none;
text-shadow:0 0 20px #ff00ff;
}

/* MAIN */

#main{
display:none;
}

h1{
margin-top:40px;
font-size:55px;
color:#ff8efb;
text-shadow:0 0 20px #ff00ff;
}

/* SLIDESHOW */

.slideshow{
width:230px;
height:230px;
margin:20px auto;
position:relative;
}

.slide{
position:absolute;
width:100%;
height:100%;
border-radius:50%;
border:5px solid #ff8efb;
box-shadow:0 0 10px #ff8efb,0 0 25px #ff00ff,0 0 50px #ff00ff;
object-fit:cover;
opacity:0;
transition:1s;
}

.slide.active{
opacity:1;
}

/* CAKE */

#cake{
position:relative;
width:240px;
height:140px;
margin:70px auto;
}

.part{
width:120px;
height:140px;
position:absolute;
transition:0.8s;
}

.left{left:0;}
.right{right:0;}

.cut .left{
transform:rotateY(-45deg) translateX(-30px);
}

.cut .right{
transform:rotateY(45deg) translateX(30px);
}

.cakeImg{
width:120px;
height:140px;
}

/* CAKE NAME */

#cakeName{
position:absolute;
top:60%;
left:50%;
transform:translate(-50%,-50%);
font-family:cursive;
font-size:24px;
color:white;
text-shadow:0 0 10px #ff0080;
}

/* KNIFE */

#knife{
position:absolute;
top:-20px;
left:-60px;
font-size:40px;
opacity:0;
transition:1s;
}

.cut #knife{
left:110px;
top:60px;
opacity:1;
}

/* CAKE SLICE */

#cakeSlice{
position:absolute;
width:40px;
height:40px;
background:#ffd8a8;
border-radius:8px;
top:60px;
left:100px;
display:none;
}

.drop{
animation:sliceDrop 2s forwards;
}

@keyframes sliceDrop{
0%{transform:translateY(0);}
100%{transform:translateY(400px) rotate(120deg);opacity:0;}
}

/* CANDLES */

.candle{
width:8px;
height:25px;
background:white;
position:absolute;
top:-25px;
}

.flame{
width:10px;
height:10px;
background:orange;
border-radius:50%;
position:absolute;
top:-10px;
left:-1px;
box-shadow:0 0 10px yellow;
animation:flicker 0.2s infinite alternate;
}

@keyframes flicker{
from{transform:scale(1);}
to{transform:scale(1.2);}
}

button{
padding:12px 22px;
font-size:18px;
border:none;
border-radius:10px;
background:#ff9800;
cursor:pointer;
margin:8px;
}

#message{
font-size:28px;
margin-top:20px;
color:#ffd7ff;
}

#popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(0);
background:white;
color:#b30000;
padding:30px;
border-radius:15px;
font-size:30px;
transition:0.5s;
}

#popup.show{
transform:translate(-50%,-50%) scale(1);
}

.confetti{
width:10px;
height:10px;
position:absolute;
top:-10px;
animation:fall 4s linear infinite;
}

@keyframes fall{
0%{transform:translateY(0) rotate(0);}
100%{transform:translateY(100vh) rotate(360deg);}
}

.fire{
position:absolute;
width:6px;
height:6px;
border-radius:50%;
animation:explode 1s ease-out forwards;
}

@keyframes explode{
0%{transform:translate(0,0);opacity:1;}
100%{transform:translate(var(--x),var(--y));opacity:0;}
}

.heart{
position:absolute;
font-size:25px;
animation:heartMove 6s linear infinite;
}

@keyframes heartMove{
0%{transform:translateY(100vh);}
100%{transform:translateY(-120vh);}
}

/* ===== GOD LEVEL ADDITION : FINAL MESSAGE ===== */

#finalLove{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(0);
background:black;
padding:40px;
font-size:40px;
border-radius:20px;
box-shadow:0 0 60px #ff00ff;
transition:0.8s;
}

#finalLove.show{
transform:translate(-50%,-50%) scale(1);
}
/* ===== ULTRA FEATURE : PHOTO ORBIT ===== */

.photoOrbit{
position:absolute;
width:70px;
height:70px;
border-radius:50%;
border:3px solid #ff8efb;
box-shadow:0 0 20px #ff00ff;
object-fit:cover;
animation:orbitPhoto 12s linear infinite;
}

@keyframes orbitPhoto{
from{transform:rotate(0deg) translateX(160px) rotate(0deg);}
to{transform:rotate(360deg) translateX(160px) rotate(-360deg);}
}

/* ===== ULTRA BACKGROUND : MILKY WAY ===== */

#milkyway{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-2;
}
/* ===== ROCKET ANIMATION ===== */

#rocket{
position:fixed;
font-size:50px;
left:-100px;
top:30%;
z-index:9999;
animation:rocketFly 12s linear forwards;
}

@keyframes rocketFly{
0%{left:-100px; top:70%;}
25%{left:25%; top:40%;}
50%{left:50%; top:30%;}
75%{left:75%; top:20%;}
100%{left:110%; top:10%;}
}

.rocketStar{
position:fixed;
font-size:20px;
color:white;
opacity:0;
animation:starAppear 1s forwards;
}

@keyframes starAppear{
from{opacity:0; transform:scale(0.5);}
to{opacity:1; transform:scale(1);}
}

/* ===== SIMPLE ROCKET ===== */

#rocket{
position:fixed;

top:60%;

}

@keyframes rocketMove{

100%{left:110%; top:10%;}

.starTrail{

function startRocket(){

let message="HAPPY BIRTHDAY ANASUYA";

setTimeout(()=>{

},12000);




















































</style>
</head>

});

let angle=Math.random()*Math.PI*2;
let radius=Math.random()*400;

galaxyStars.push({
angle:angle,
radius:radius,
speed:0.0005+Math.random()*0.001
});

}

function drawMilkyWay(){

mctx.clearRect(0,0,milkyCanvas.width,milkyCanvas.height);

galaxyStars.forEach(s=>{

let x=milkyCanvas.width/2 + Math.cos(s.angle)*s.radius;
let y=milkyCanvas.height/2 + Math.sin(s.angle)*s.radius;

mctx.fillStyle="white";
mctx.fillRect(x,y,2,2);

s.angle+=s.speed;

});

requestAnimationFrame(drawMilkyWay);

}

drawMilkyWay();
/* ===== ROCKET MESSAGE ===== */

function launchRocket(){

let rocket=document.createElement("div");
rocket.id="rocket";
rocket.innerHTML="🚀";

document.body.appendChild(rocket);

let message="HAPPY BIRTHDAY ANASUYA";

/* create star letters */

for(let i=0;i<message.length;i++){

setTimeout(()=>{

let star=document.createElement("div");

star.className="rocketStar";
star.innerHTML=message[i];

star.style.left=(20 + i*3)+"%";
star.style.top="15%";

document.body.appendChild(star);

},i*200);

}

}

/* launch rocket after gift opens */

setTimeout(()=>{
launchRocket();
},9000);
