
<!DOCTYPE html>
<html>
<head>
<title>Anasuya’s Birthday Galaxy</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#020111">
<link rel="apple-touch-icon" href="icon.png">


</head>

<style>

/* BODY */

body{
margin:0;
overflow:hidden;
font-family:Arial;
text-align:center;
color:white;
background:radial-gradient(circle at top,#1a1a3d,#020111);
}

/* STARS */

.star{
position:absolute;
width:2px;
height:2px;
background:white;
animation:twinkle 2s infinite alternate;
}

@keyframes twinkle{
from{opacity:0.2;}
to{opacity:1;}
}

/* BALLOONS */

.balloon{
width:60px;
height:80px;
border-radius:50%;
position:absolute;
bottom:-120px;
animation:fly 8s linear infinite;
}

.balloon:after{
content:"";
position:absolute;
width:2px;
height:60px;
background:white;
left:29px;
top:80px;
}

@keyframes fly{
0%{transform:translateY(0);}
100%{transform:translateY(-120vh);}
}

/* SHOOTING STARS */

.shoot{
position:absolute;
width:3px;
height:3px;
background:white;
box-shadow:0 0 10px white;
animation:shootMove 3s linear forwards;
}

@keyframes shootMove{
0%{transform:translate(0,0);}
100%{transform:translate(-700px,400px);opacity:0;}
}

/* GIFT */

#gift{
position:fixed;
top:40%;
left:50%;
transform:translate(-50%,-50%);
font-size:120px;
cursor:pointer;
animation:shake 1s infinite;
}

@keyframes shake{
0%{transform:translate(-50%,-50%) rotate(0);}
25%{transform:translate(-50%,-50%) rotate(6deg);}
50%{transform:translate(-50%,-50%) rotate(-6deg);}
75%{transform:translate(-50%,-50%) rotate(6deg);}
100%{transform:translate(-50%,-50%) rotate(0);}
}

/* COUNTDOWN */

#countdown{
position:fixed;
top:45%;
left:50%;
transform:translate(-50%,-50%);
font-size:120px;
display:none;
text-shadow:0 0 20px #ff00ff;
}

/* MAIN */

#main{
display:none;
}

/* TITLE */

h1{
margin-top:40px;
font-size:55px;
color:#ff8efb;
text-shadow:0 0 20px #ff00ff;
}

/* GLOWING SLIDESHOW */

.slideshow{
width:230px;
height:230px;
margin:20px auto;
position:relative;
}

.slide{
position:absolute;
width:100%;
height:100%;
border-radius:50%;
border:5px solid #ff8efb;
box-shadow:
0 0 10px #ff8efb,
0 0 25px #ff00ff,
0 0 50px #ff00ff,
0 0 80px #ff00ff;
object-fit:cover;
opacity:0;
transition:1s;
}

.slide.active{
opacity:1;
}

/* CAKE */

#cake{
position:relative;
width:240px;
height:140px;
margin:70px auto;
}

.part{
width:120px;
height:140px;
position:absolute;
transition:0.8s;
}

.left{left:0;}
.right{right:0;}

.cut .left{
transform:rotateY(-45deg) translateX(-30px);
}

.cut .right{
transform:rotateY(45deg) translateX(30px);
}

.cakeImg{
width:120px;
height:140px;
}

/* NAME ON CAKE */

#cakeName{
position:absolute;
top:60%;
left:50%;
transform:translate(-50%,-50%);
font-family:cursive;
font-size:24px;
color:white;
text-shadow:0 0 10px #ff0080;
}

/* KNIFE */

#knife{
position:absolute;
top:-20px;
left:-60px;
font-size:40px;
opacity:0;
transition:1s;
}

.cut #knife{
left:110px;
top:60px;
opacity:1;
}

/* CANDLES */

.candle{
width:8px;
height:25px;
background:white;
position:absolute;
top:-25px;
}

.flame{
width:10px;
height:10px;
background:orange;
border-radius:50%;
position:absolute;
top:-10px;
left:-1px;
box-shadow:0 0 10px yellow;
animation:flicker 0.2s infinite alternate;
}

@keyframes flicker{
from{transform:scale(1);}
to{transform:scale(1.2);}
}

/* BUTTON */

button{
padding:12px 22px;
font-size:18px;
border:none;
border-radius:10px;
background:#ff9800;
cursor:pointer;
margin:8px;
}

/* MESSAGE */

#message{
font-size:28px;
margin-top:20px;
color:#ffd7ff;
}

/* POPUP */

#popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(0);
background:white;
color:#b30000;
padding:30px;
border-radius:15px;
font-size:30px;
transition:0.5s;
}

#popup.show{
transform:translate(-50%,-50%) scale(1);
}

/* CONFETTI */

.confetti{
width:10px;
height:10px;
position:absolute;
top:-10px;
animation:fall 4s linear infinite;
}

@keyframes fall{
0%{transform:translateY(0) rotate(0);}
100%{transform:translateY(100vh) rotate(360deg);}
}

/* FIREWORK */

.fire{
position:absolute;
width:6px;
height:6px;
border-radius:50%;
animation:explode 1s ease-out forwards;
}

@keyframes explode{
0%{transform:translate(0,0);opacity:1;}
100%{transform:translate(var(--x),var(--y));opacity:0;}
}

/* HEART */

.heart{
position:absolute;
font-size:25px;
animation:heartMove 6s linear infinite;
}

@keyframes heartMove{
0%{transform:translateY(100vh);}
100%{transform:translateY(-120vh);}
}

</style>
</head>

<body>

<div id="gift">🎁</div>
<div id="countdown"></div>
<div id="popup">🎉 Surprise Anasuya! 🎉</div>

<div id="main">

<h1>🎉 Happy Birthday Anasuya 🎂</h1>

<div class="slideshow">
<img src="photo1.jpeg" class="slide active">
<img src="photo2.jpeg" class="slide">
<img src="photo3.jpeg" class="slide">
</div>

<div id="cake">

<div class="part left">
<img src="cake.png" class="cakeImg">
<div class="candle" style="left:30px"><div class="flame"></div></div>
</div>

<div class="part right">
<img src="cake.png" class="cakeImg">
<div class="candle" style="left:70px"><div class="flame"></div></div>
</div>

<div id="cakeName">Anasuya</div>
<div id="knife">🔪</div>

</div>

<button onclick="cutCake()">🔪 Cut Cake</button>
<button onclick="blow()">💨 Blow Candles</button>

<div id="message"></div>

<audio id="music" src="birthday.mp3"></audio>

</div>

<script>

/* STARS */

for(let i=0;i<250;i++){
let s=document.createElement("div");
s.className="star";
s.style.left=Math.random()*100+"%";
s.style.top=Math.random()*100+"%";
document.body.appendChild(s);
}

/* BALLOONS */

for(let i=0;i<25;i++){
let b=document.createElement("div");
b.className="balloon";
b.style.left=Math.random()*100+"%";
b.style.backgroundColor="hsl("+Math.random()*360+",70%,60%)";
b.style.animationDuration=(6+Math.random()*4)+"s";
document.body.appendChild(b);
}

/* SHOOTING STARS */

setInterval(()=>{
let s=document.createElement("div");
s.className="shoot";
s.style.left=Math.random()*100+"%";
s.style.top=Math.random()*50+"%";
document.body.appendChild(s);
setTimeout(()=>s.remove(),3000);
},2000);

/* GIFT */

document.getElementById("gift").onclick=()=>{

let c=document.getElementById("countdown");
c.style.display="block";

let n=3;
c.innerHTML=n;

let t=setInterval(()=>{

n--;

if(n==0){
c.innerHTML="🎉";
clearInterval(t);

setTimeout(()=>{
c.style.display="none";
openGift();
},500);
}

else c.innerHTML=n;

},1000);

};

function openGift(){

document.getElementById("gift").style.display="none";
document.getElementById("main").style.display="block";

document.getElementById("music").play();

document.getElementById("popup").classList.add("show");

setTimeout(()=>{
document.getElementById("popup").classList.remove("show");
},4000);

}

/* SLIDESHOW */

let slides=document.querySelectorAll(".slide");
let index=0;

setInterval(()=>{
slides[index].classList.remove("active");
index=(index+1)%slides.length;
slides[index].classList.add("active");
},3000);

/* CUT CAKE */

function cutCake(){

document.getElementById("cake").classList.toggle("cut");

/* FLASH EFFECT */

document.body.style.background="white";

setTimeout(()=>{
document.body.style.background="radial-gradient(circle at top,#1a1a3d,#020111)";
},120);

typeMessage();
fireworks();
confetti();
hearts();

}

/* BLOW CANDLES */

function blow(){
document.querySelectorAll(".flame").forEach(f=>f.style.display="none");
}

/* MESSAGE */

function typeMessage(){

let text="💖 Happy Birthday Anasuya! May your life always shine with happiness and love! 💖";

let i=0;

function type(){
if(i<text.length){
document.getElementById("message").innerHTML+=text.charAt(i);
i++;
setTimeout(type,60);
}
}

type();

}

/* CONFETTI */

function confetti(){
for(let i=0;i<150;i++){
let c=document.createElement("div");
c.className="confetti";
c.style.left=Math.random()*100+"%";
c.style.backgroundColor="hsl("+Math.random()*360+",80%,60%)";
document.body.appendChild(c);
}
}

/* FIREWORKS */

function fireworks(){

for(let i=0;i<8;i++){

let x=Math.random()*window.innerWidth;
let y=Math.random()*window.innerHeight/2;

for(let j=0;j<30;j++){

let f=document.createElement("div");
f.className="fire";
f.style.left=x+"px";
f.style.top=y+"px";

let dx=(Math.random()-0.5)*300+"px";
let dy=(Math.random()-0.5)*300+"px";

f.style.setProperty("--x",dx);
f.style.setProperty("--y",dy);

document.body.appendChild(f);

setTimeout(()=>f.remove(),1000);

}

}

}

/* HEART RAIN */

function hearts(){
for(let i=0;i<30;i++){
let h=document.createElement("div");
h.className="heart";
h.innerHTML="❤";
h.style.left=Math.random()*100+"%";
document.body.appendChild(h);
}
}

</script>

</body>
</html>
